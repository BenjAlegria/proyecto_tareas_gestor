<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-contenido">
            <img src="assets/img/logo.png" alt="Logo" class="logo">
            <h1>Gestor de Tareas</h1>
            <nav>
                <a href="#formulario">Nueva Tarea</a>
                <a href="#tablero">Tablero</a>
            </nav>
        </div>
    </header>

    <!-- MAIN -->
    <main>

        <!-- FORMULARIO -->
        <section id="formulario">
            <h2>Nueva Tarea</h2>

            <form id="form-tarea">

                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" placeholder="Escribe la descripción de la tarea" required></textarea>

                <label for="prioridad">Prioridad:</label>
                <select id="prioridad" required>
                    <option value="">Seleccionar...</option>
                    <option value="alta">Alta</option>
                    <option value="media">Media</option>
                    <option value="baja">Baja</option>
                </select>

                <label for="fecha">Fecha límite:</label>
                <input type="date" id="fecha" required>

                <button type="submit">Agregar Tarea</button>

            </form>
        </section>

        <!-- TABLERO KANBAN -->
        <section id="tablero">
            <h2>Tablero Kanban</h2>

            <div class="columnas">

                <div class="columna" id="pendientes">
                    <h3>Pendientes <span class="contador" id="contador-pendientes">0</span></h3>
                    <div class="tareas-container" id="container-pendientes"></div>
                </div>

                <div class="columna" id="en-progreso">
                    <h3>En Progreso <span class="contador" id="contador-progreso">0</span></h3>
                    <div class="tareas-container" id="container-progreso"></div>
                </div>

                <div class="columna" id="completadas">
                    <h3>Completadas <span class="contador" id="contador-completadas">0</span></h3>
                    <div class="tareas-container" id="container-completadas"></div>
                </div>

            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>Gestor de Tareas - Evaluación N°2</p>
        <p>Contacto: <a href="mailto:balegria2025@alu.uct.cl">balegria2025@alu.uct.cl</a></p>
        <p>Plataforma: <a href="https://educa.uct.cl">educa.uct.cl</a></p>
    </footer>


    <script src="assets/js/script.js"></script>
</body>
</html>
